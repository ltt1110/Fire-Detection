version: '3.8'

# ============================================================
# 🔥 Fire Detection - Elasticsearch Stack
# ============================================================
# Khởi động: docker-compose up -d
# Dừng:      docker-compose down
# Xóa data:  docker-compose down -v
# Kibana UI: http://localhost:5601
# ES API:    http://localhost:9200
# ============================================================

services:
  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: fire-detection-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false       # Tắt auth để dễ dùng local
      - xpack.license.self_generated.type=basic
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"  # Giới hạn RAM 512MB
      - cluster.name=fire-detection-cluster
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  kibana:
    image: kibana:8.13.4
    container_name: fire-detection-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  es_data:
    driver: local
